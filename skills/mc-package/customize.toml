# DO NOT EDIT -- overwritten on every update.
#
# Customization surface for mc-package.
# Override files (not edited here):
#   {project-root}/_bmad/custom/mc-package.toml         (team)
#   {project-root}/_bmad/custom/mc-package.user.toml    (personal)
#
# Studio-wide config (owner, paths, editor, transcription, assets, tools)
# lives in [modules.manticore] in {project-root}/_bmad/custom/config.toml,
# maintained by mc-setup. This file holds only this skill's own surface.

[workflow]

# Steps to run before / after the standard activation.
activation_steps_prepend = []
activation_steps_append = []

# Persistent facts held for the whole run: literal sentences, or
# "file:{project-root}/..." paths whose contents are loaded as facts.
persistent_facts = []

[packaging]

# Title+thumbnail candidates to present (series projects present them as
# exactly this many A/B pairs).
candidates = 3

# Hard cap on on-image thumbnail hook words (face-plus-hook convention).
hook-words-max = 4

# Title length cap in characters (front-load what matters; longer gets cut
# off in feeds).
title-max-chars = 60

# Proof width in pixels for the mandatory downscale verification
# (verify_thumb.py). 120 approximates the smallest feed rendering.
verify-width = 120
