# DO NOT EDIT -- overwritten on every update.
#
# Customization surface for mc-prompter.
# Override files (not edited here):
#   {project-root}/_bmad/custom/mc-prompter.toml         (team)
#   {project-root}/_bmad/custom/mc-prompter.user.toml    (personal)
#
# Studio-wide config (owner, paths, prompter defaults) lives in
# [modules.manticore] in {project-root}/_bmad/custom/config.toml,
# maintained by mc-setup. This file holds only this skill's own surface.

[workflow]

# Steps to run before / after the standard activation.
activation_steps_prepend = []
activation_steps_append = []

# Persistent facts held for the whole run: literal sentences, or
# "file:{project-root}/..." paths whose contents are loaded as facts.
persistent_facts = []

[prompter]

# Default port for the prompter server; the studio config's
# [prompter] port overrides this when set.
port = 8770

# Voice-follow ASR provider. Working values: "nemotron-streaming"
# (default, streaming English ASR via sherpa-onnx) and "none" (classic
# prompter, no ASR). "zipformer-small" is a planned lane for low-end
# hardware; selecting it makes the server exit with a pointer, it never
# pretends to run. The studio config's [prompter] asr-provider overrides
# this when set.
asr-provider = "nemotron-streaming"

# Engine workspace folder for voice-follow, resolved by the skill as
# {engines-path}/{workspace} when a studio config exists. Holds the ASR
# venv and model files; the first bootstrap downloads ~465 MB and is
# consent-gated by the skill. The classic prompter needs no workspace.
workspace = "prompter-lab"

# Producer-mode cue frequency: "hands-off" (time-critical attention cues
# only), "minimal", "normal", or "chatty". A rundown's own frontmatter
# cue-density overrides this; the studio config's [prompter] cue-density
# overrides this default when set.
cue-density = "normal"

[llm]

# Local LLM lane for producer mode's coverage judgments and cue
# suggestions, mirroring the studio config's [llm] table (which overrides
# these defaults when set). "ollama" is the only implemented provider;
# anything else makes the server exit with a pointer, it never pretends
# to run. Producer mode degrades honestly without Ollama: the
# deterministic rail and time cues still work, coverage judgments do not.
provider = "ollama"
# Any Ollama tag; smaller tags (for example qwen3:1.7b) suit CPU-only
# machines.
model = "qwen3:4b"
endpoint = "http://localhost:11434"
# Env var for a paid LLM lane's key. Stays empty for local lanes,
# pattern-consistent with the other lanes.
api-key-env = ""
