<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 rx=%223%22 fill=%22%23101418%22/><rect x=%223%22 y=%227%22 width=%2210%22 height=%222%22 fill=%22%2360b8f0%22/></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mc-prompter | overlay</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <link rel="stylesheet" href="/static/css/overlay.css">
</head>
<body>

  <!-- Connect badge (Phase A): hides itself after 5 s. -->
  <div id="badge"><span class="dot"></span> mc-prompter session connected</div>

  <!-- Phase B: voice-follow indicator, hidden until anchor/vad frames flow.
       Shows speaking state and the committed anchor word index. -->
  <div id="voice-badge" class="hidden"><span class="dot" id="voice-dot"></span>
    <span id="voice-text">voice</span></div>

  <!-- Phase C: the producer ambient rail and the cue card. Both stay empty
       and invisible until a rundown session is running; the page background
       is fully transparent for OBS. -->
  <div id="rail"></div>
  <div id="cue"></div>

  <script src="/static/js/ws.js"></script>
  <script src="/static/js/model.js"></script>
  <script src="/static/js/rail.js"></script>
  <script src="/static/js/overlay.js"></script>
</body>
</html>
